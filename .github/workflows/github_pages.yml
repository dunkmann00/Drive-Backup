name: Github Pages

on:
  push:
  # Runs when a release is published
  release:
    types: [released]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build & Deploy Job
  gh_pages:
    name: Build & Deploy Github Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.gh_pages.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prep For Pages
        run: |
          # Copy the icon into the root
          cp src/drive_backup/resources/drive-backup-icon.png .
          # Update the icon links in the README
          sed -i 's#src/drive_backup/resources/drive-backup-icon.png#drive-backup-icon.png#g' README.md
      - name: Build & Deploy
        id: gh_pages
        uses: dunkmann00/jekyll-v4-gh-pages@v1
        with:
          source: ${{ env.GHP_SOURCE_DIR }}
